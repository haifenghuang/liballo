name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build build-essential clang

      - name: Install Meson
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install meson

      - name: Configure build
        run: meson setup build --wipe --reconfigure -Db_sanitize=address,undefined -Dbuildtype=debug

      - name: Build
        run: ninja -C build -v

      - name: Run tests
        run: meson test -C build --print-errorlogs

  freestanding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build build-essential clang

      - name: Install Meson
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install meson

      - name: Configure build
        run: meson setup build-freestanding --wipe --reconfigure -Dbuildtype=debug

      - name: Build tests
        run: ninja -C build-freestanding

      - name: Run tests
        run: meson test -C build-freestanding --print-errorlogs

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build build-essential clang

      - name: Install Meson
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install meson

      - name: Configure build
        run: meson setup build-bench --wipe --reconfigure -Dbuildtype=release

      - name: Build benchmarks
        run: ninja -C build-bench

      - name: Run benchmarks
        run: meson test -C build-bench --benchmark -v

  fuzz:
    # Only run fuzzing for pull requests (skip on push-to-main to keep main fast)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          # Try installing afl++ (preferred), fallback to afl
          sudo apt-get install -y ninja-build build-essential clang python3-pip || true
          sudo apt-get install -y afl++ || sudo apt-get install -y afl || true

      - name: Install Meson
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install meson

      - name: Prepare AFL build and corpus
        env:
          CC: afl-clang-lto
          CXX: afl-clang-lto++
        run: |
          chmod +x ./scripts/fuzz.sh
          ./scripts/fuzz.sh

      - name: Run afl-fuzz for 30s
        env:
          AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES: 1
          AFL_SKIP_CPUFREQ: 1
        run: |
          afl-fuzz -i fuzz_in -o fuzz_out -V 30 -- ./build-afl/tests/fuzz_allocator @@ || true
